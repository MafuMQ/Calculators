<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Financial Calculators{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">💰 Cost Calculators</a>
            <ul class="nav-links">
                <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a></li>
                <li><a href="/solar" {% if request.path == '/solar' %}class="active"{% endif %}>Solar Break-Even</a></li>
                <li><a href="/building" {% if request.path == '/building' %}class="active"{% endif %}>Building Recovery</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Cost Recovery Calculators. All estimates exclude taxes and additional fees.</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
